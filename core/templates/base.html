<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>{% block title %}VitaCell - iPhone Store{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    {% if user.is_authenticated %}
    <nav class="apple-nav">
        <div class="container">
            <a href="{% url 'home' %}" class="apple-logo">
                <i class="fab fa-apple"></i> VitaCell
            </a>
            <div class="apple-nav-links">
                <a href="{% url 'produto_lista' %}">Produtos</a>
                <a href="{% url 'cliente_lista' %}">Clientes</a>
                <a href="{% url 'venda_lista' %}">Vendas</a>
                <div class="user-menu">
                    <i class="fas fa-user-circle"></i>
                    <span>{{ user.get_full_name|default:user.username }}</span>
                </div>
                <a href="{% url 'logout' %}">
                    <i class="fas fa-sign-out-alt"></i>
                </a>
            </div>
        </div>
    </nav>
    {% endif %}

    <main class="main-content">
        <div class="container">
            {% if messages %}
                {% for message in messages %}
                    <div class="alert-apple {% if message.tags == 'success' %}alert-success{% else %}alert-error{% endif %}">
                        <i class="fas fa-{% if message.tags == 'success' %}check-circle{% else %}exclamation-circle{% endif %} me-2"></i>
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}

            {% block content %}
            {% endblock %}
        </div>
    </main>
</body>
</html>
